name: Hourly Investment Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-hourly-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run hourly pipeline
        run: python scripts/run_hourly_job.py
